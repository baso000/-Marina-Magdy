<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Add New Course </title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <nav>
      <a href="index.html">Home</a>
      <a href="courses.html">Courses</a>
      <a href="add-course.html" class="active">Add Course</a>
      <a href="contact.html">Contact</a>
    </nav>
  </header>

  <main>
    <div class="form-container">
      <h2>Add New Course</h2>
      
      <form action="#" method="post">
        <div class="form-group">
          <label>Course Name</label>
          <input type="text" placeholder="Enter course name" required>
        </div>

        <div class="form-group">
          <label>Instructor Name</label>
          <input type="text" placeholder="Enter instructor name" required>
        </div>

        <div class="form-group">
          <label>Duration (Hours)</label>
          <input type="number" placeholder="e.g. 45" required>
        </div>

        <div class="form-group">
          <label>Price ($)</label>
          <input type="number" placeholder="e.g. 75" required>
        </div>

        <div class="form-group">
          <label>Notes</label>
          <textarea rows="5" placeholder="Additional notes about the course..."></textarea>
        </div>

        <button type="submit" class="btn">Add Course </button>
      </form>
    </div>
  </main>

  <footer>
    <p>© 2026 Made with Marina Magdy</p>
  </footer>
</body>
</html>
